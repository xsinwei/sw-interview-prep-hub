const CATS=['All','Behavioral','UX','Product','Case','Motivation','General'];
async function loadCardsFromSupabase() {
  const { data, error } = await supabaseClient
    .from('cards')
    .select('*')
    .order('created_at', { ascending: true });

  if (error) {
    console.error('Error loading cards:', error);
    return SEED;
  }

  return data && data.length > 0 ? data : SEED;
}

async function addCardToSupabase(card) {
  const { data, error } = await supabaseClient
    .from('cards')
    .insert([
      {
        title: card.title,
        category: card.category,
        content: card.content
      }
    ])
    .select()
    .single();

  if (error) {
    console.error('Error adding card:', error);
    return null;
  }

  return data;
}

async function updateCardInSupabase(card) {
  const { data, error } = await supabaseClient
    .from('cards')
    .update({
      title: card.title,
      category: card.category,
      content: card.content,
      updated_at: new Date().toISOString()
    })
    .eq('id', card.id)
    .select()
    .single();

  if (error) {
    console.error('Error updating card:', error);
    return null;
  }

  return data;
}

async function deleteCardFromSupabase(id) {
  const { error } = await supabaseClient
    .from('cards')
    .delete()
    .eq('id', id);

  if (error) {
    console.error('Error deleting card:', error);
    return false;
  }

  return true;
}

function PixelIcon({type,size=16}){
  const icons={
    heart:'M2,0 L4,0 L4,2 L6,2 L6,4 L8,4 L8,2 L10,2 L10,0 L12,0 L12,4 L10,4 L10,6 L8,6 L8,8 L6,8 L6,10 L4,10 L4,8 L2,8 L2,6 L0,6 L0,4 L2,4 Z',
    star:'M6,0 L8,0 L8,4 L12,4 L12,6 L10,6 L10,8 L12,8 L12,10 L8,10 L8,14 L6,14 L6,10 L2,10 L2,8 L4,8 L4,6 L2,6 L2,4 L6,4 Z',
    tree:'M4,0 L8,0 L8,2 L10,2 L10,4 L12,4 L12,6 L10,6 L10,8 L12,8 L12,10 L2,10 L2,8 L4,8 L4,6 L2,6 L2,4 L4,4 L4,2 L6,2 L6,12 L8,12 L8,14 L4,14 L4,12 L6,12 L6,2 Z',
  };
  return h('svg',{width:size,height:size,viewBox:'0 0 14 14',style:{imageRendering:'pixelated',display:'block'}},
    h('path',{d:icons[type]||icons.heart,fill:'currentColor'})
  );
}

function AddModal({onSave,onClose}){
  const[t,setT]=useState('');const[cat,setCat]=useState('Behavioral');const[c,setC]=useState('');
  return h('div',{className:'overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'modal'},
      h('p',{className:'modal-title'},'new card.'),
      h('p',{className:'modal-sub'},'add · interview script'),
      h('div',{className:'field'},h('label',null,'question / title'),h('input',{value:t,onChange:e=>setT(e.target.value),placeholder:'e.g. Walk me through a project...',autoFocus:true})),
      h('div',{className:'field'},h('label',null,'category'),h('select',{value:cat,onChange:e=>setCat(e.target.value)},CATS.filter(c=>c!=='All').map(c=>h('option',{key:c},c)))),
      h('div',{className:'field'},h('label',null,'your answer'),h('textarea',{value:c,onChange:e=>setC(e.target.value),rows:9,placeholder:'Write your prepared script here...'})),
      h('div',{className:'modal-actions'},
        h('button',{className:'btn ghost',onClick:onClose},'cancel'),
        h('button',{className:'btn primary',onClick:()=>{if(!t.trim()||!c.trim())return;onSave({id:Date.now().toString(),title:t.trim(),category:cat,content:c.trim()});},disabled:!t.trim()||!c.trim()},'save card')
      )
    )
  );
}

function DetailView({card,onBack,onUpdate,onDelete}){
  const[editing,setEditing]=useState(false);
  const[title,setTitle]=useState(card.title);
  const[content,setContent]=useState(card.content);
  const[toast,setToast]=useState(false);
  function doSave(){onUpdate({...card,title,content});setEditing(false);setToast(true);setTimeout(()=>setToast(false),2200);}
  const color=CAT_COLOR[card.category]||'var(--muted)';
  return h('div',{className:'detail-wrap'},
    h('button',{className:'detail-back',onClick:onBack},'← all cards'),
    h('div',{className:'detail-cat-row'},
      h('div',{className:`cat-stripe stripe-${card.category}`}),
      h('span',{className:'detail-cat-label'},card.category)
    ),
    editing
      ? h('div',{className:'field',style:{marginBottom:20}},h('input',{value:title,onChange:e=>setTitle(e.target.value),style:{fontFamily:"'DM Serif Display',serif",fontSize:24,borderRadius:12,background:'var(--cream)',border:'1px solid var(--border2)',padding:'8px 13px',color:color,width:'100%',outline:'none'}}))
      : h('h1',{className:'detail-title',style:{color}},title),
    editing
      ? h('textarea',{value:content,onChange:e=>setContent(e.target.value),className:'detail-body editing',rows:13,style:{width:'100%'}})
      : h('div',{className:'detail-body'},content),
    h('div',{className:'detail-actions'},
      editing
        ? h(React.Fragment,null,h('button',{className:'btn primary',onClick:doSave},'save changes'),h('button',{className:'btn ghost',onClick:()=>{setEditing(false);setTitle(card.title);setContent(card.content);}},'cancel'))
        : h(React.Fragment,null,h('button',{className:'btn',onClick:()=>setEditing(true)},'edit'),h('button',{className:'btn danger',onClick:()=>{if(confirm('Delete this card?'))onDelete(card.id);}},'delete'))
    ),
    toast&&h(Toast,{msg:'saved ♥'})
  );
}

function PracticeView({cards,onExit}){
  const[idx,setIdx]=useState(0);const[shown,setShown]=useState(false);
  if(!cards.length)return h('div',{className:'practice-wrap'},h('p',{style:{color:'var(--muted2)',fontFamily:"'DM Mono',monospace",fontSize:11}},'no cards'),h('button',{className:'btn',style:{marginTop:16},onClick:onExit},'← exit'));
  const card=cards[idx];const pct=((idx+1)/cards.length)*100;
  function next(){setIdx(i=>(i+1)%cards.length);setShown(false);}
  function prev(){setIdx(i=>(i-1+cards.length)%cards.length);setShown(false);}
  function rand(){let r;do{r=Math.floor(Math.random()*cards.length);}while(r===idx&&cards.length>1);setIdx(r);setShown(false);}
  const color=CAT_COLOR[card.category]||'var(--muted)';
  return h('div',{className:'practice-wrap'},
    h('div',{className:'practice-top'},
      h('span',{className:'practice-lbl'},'♥ practice mode'),
      h('span',{className:'practice-lbl'},`${idx+1} / ${cards.length}`),
      h('button',{className:'btn ghost sm',onClick:onExit},'exit ×')
    ),
    h('div',{className:'progress-track'},h('div',{className:'progress-fill',style:{width:pct+'%'}})),
    h('div',{className:'practice-card'},
      h('div',{className:'practice-card-deco',style:{color}},CAT_ICON[card.category]||'♥'),
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h('div',{className:`cat-stripe stripe-${card.category}`}),
        h('span',{style:{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.7px',textTransform:'uppercase',color:'var(--muted)'}},card.category)
      ),
      h('p',{className:'practice-q',style:{color}},card.title),
      shown
        ? h('div',{className:'practice-ans'},card.content)
        : h('button',{className:'reveal-btn',onClick:()=>setShown(true)},'reveal answer')
    ),
    h('div',{className:'practice-controls'},
      h('button',{className:'btn',onClick:prev},'← prev'),
      h('button',{className:'btn',onClick:rand},'random'),
      h('button',{className:'btn primary',onClick:next},'next →')
    )
  );
}

function App(){
  const[cards,setCards]=useState([]);
  const[loaded,setLoaded]=useState(false);
  const[search,setSearch]=useState('');
  const[cat,setCat]=useState('All');
  const[view,setView]=useState('grid');
  const[sel,setSel]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[toast,setToast]=useState(null);

  useEffect(() => {
    async function initCards() {
      const serverCards = await loadCardsFromSupabase();
      setCards(serverCards);
      setLoaded(true);
    }

    initCards();
  }, []);

  const filtered=cards.filter(c=>{
    const mc=cat==='All'||c.category===cat;
    const q=search.toLowerCase();
    return mc&&(!q||c.title.toLowerCase().includes(q)||c.content.toLowerCase().includes(q));
  });

  if (!loaded) {
    return h('div', {
      style: {
        padding: '40px',
        fontFamily: "'DM Mono', monospace",
        color: 'var(--muted)'
      }
    }, 'Loading cards...');
  }

  async function addCard(card) {
    const savedCard = await addCardToSupabase(card);
  
    if (!savedCard) {
      flash('failed to save');
      return;
    }
  
    setCards(p => [savedCard, ...p]);
    setShowAdd(false);
    flash('card saved ♥');
  }
  
  async function updateCard(u) {
    const savedCard = await updateCardInSupabase(u);
  
    if (!savedCard) {
      flash('failed to update');
      return;
    }
  
    setCards(p => p.map(c => c.id === savedCard.id ? savedCard : c));
    setSel(savedCard);
    flash('updated ♥');
  }
  
  async function deleteCard(id) {
    const success = await deleteCardFromSupabase(id);
  
    if (!success) {
      flash('failed to delete');
      return;
    }
  
    setCards(p => p.filter(c => c.id !== id));
    setView('grid');
    setSel(null);
    flash('deleted');
  }
  function flash(msg){setToast(msg);setTimeout(()=>setToast(null),2200);}

  const PracticeBar=()=>h('div',{className:'header'},
    h('div',{className:'logo-wrap'},
      h('div',{className:'logo-icon'},'♥'),
      h('span',{className:'logo-name'},'interview prep hub'),
      h('span',{className:'logo-ver'},'V0.0.1 · 2026')
    ),
    h('button',{className:'home-btn',onClick:()=>setView('grid')},'⌂ home')
  );

  if(view==='practice') return h('div',null,
    h(PracticeBar),
    h(PracticeView,{cards:filtered,onExit:()=>setView('grid')}),
    toast&&h(Toast,{msg:toast})
  );

  if(view==='detail'&&sel) return h('div',null,
    h('div',{className:'header'},
      h('div',{className:'logo-wrap'},
        h('div',{className:'logo-icon'},'♥'),
        h('span',{className:'logo-name'},'interview prep hub'),
        h('span',{className:'logo-ver'},'V0.0.1 · 2026')
      ),
      h('button',{className:'home-btn',onClick:()=>{setView('grid');setSel(null);}},'⌂ home')
    ),
    h('div',{className:'main'},
      h(DetailView,{card:sel,onBack:()=>{setView('grid');setSel(null);},onUpdate:updateCard,onDelete:deleteCard})
    ),
    toast&&h(Toast,{msg:toast})
  );

  return h('div',null,
    h('div',{className:'header'},
      h('div',{className:'logo-wrap'},
        h('div',{className:'logo-icon'},'♥'),
        h('span',{className:'logo-name'},'interview prep hub'),
        h('span',{className:'logo-ver'},'V0.0.1 · 2026')
      ),
      h('div',{className:'nav'},
        h('span',{className:'nav-item'},h('span',{className:'num'},'01 · '),'CARDS'),
        h('span',{className:'nav-item'},h('span',{className:'num'},'02 · '),'PRACTICE'),
      ),
      h('button',{className:'home-btn',onClick:()=>{setSearch('');setCat('All');}},'⌂ home'),
      h('button',{className:'add-card-btn',onClick:()=>setShowAdd(true)},'+ add card'),
      h('button',{className:'header-cta',onClick:()=>setView('practice')},'practice →')
    ),

    h('div',{className:'filters-bar'},
      h('span',{className:'breadcrumb'},'.CARDS',h('span',null,' / '),'.ALL'),
      CATS.map(c=>h('button',{key:c,className:`tag-pill${cat===c?' active':''}`,onClick:()=>setCat(c)},c)),
      h('div',{className:'search-wrap'},
        h('span',{className:'search-icon'},'⌕'),
        h('input',{value:search,onChange:e=>setSearch(e.target.value),placeholder:'search cards...'})
      )
    ),

    h('div',{className:'main'},
      h('div',{className:'section-head'},
        h('span',{className:'section-path'},'.CARDS / .',cat.toUpperCase()),
        h('span',{className:'section-count'},`${filtered.length} card${filtered.length!==1?'s':''}`)
      ),
      h('div',{className:'grid'},
        filtered.length===0
          ? h('div',{className:'empty-state'},
              h('p',{className:'empty-big'},'no cards yet.'),
              h('p',{className:'empty-sub'},'add your first interview script below')
            )
          : filtered.map((card,i)=>{
              const color=CAT_COLOR[card.category]||'var(--muted)';
              const icon=CAT_ICON[card.category]||'·';
              return h('div',{key:card.id,className:`card accent-${card.category}`,onClick:()=>{setSel(card);setView('detail');}},
                h('div',{className:'card-top'},
                  h('span',{className:'card-label'},
                    h('span',{className:'num'},String(i+1).padStart(2,'0'),' · '),
                    card.category.toUpperCase()
                  ),
                  h('span',{className:'card-icon',style:{color}},icon)
                ),
                h('p',{className:'card-title-text'},card.title),
                h('p',{className:'card-sub'},card.content.split('\n')[0]),
                h('div',{className:'card-footer'},
                  h('div',{className:`cat-stripe stripe-${card.category}`}),
                  h('button',{className:'card-del',onClick:e=>{e.stopPropagation();if(confirm('Delete this card?'))deleteCard(card.id);}},'delete')
                )
              );
            })
      )
    ),

    h('button',{className:'fab',onClick:()=>setShowAdd(true),title:'Add card'},'+'),
    showAdd&&h(AddModal,{onSave:addCard,onClose:()=>setShowAdd(false)}),
    toast&&h(Toast,{msg:toast})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
